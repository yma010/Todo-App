name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (alembic + pytest)
    runs-on: ubuntu-latest

    # Service container — same image as docker-compose, same credentials, so
    # the test config defaults (postgresql+psycopg://todo:todo@localhost:5432/…)
    # work without any CI-specific overrides.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: todo
          POSTGRES_PASSWORD: todo
          POSTGRES_DB: todo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U todo -d todo"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # Used by both the app (when alembic upgrade runs) and the test conftest
      # (which connects as `todo` to the maintenance `postgres` DB to create
      # `todo_test`, then runs Base.metadata.create_all on it).
      DATABASE_URL: postgresql+psycopg://todo:todo@localhost:5432/todo

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install backend deps
        working-directory: backend
        run: uv sync --frozen

      # Verify the migration history is non-broken. The test suite uses
      # Base.metadata.create_all rather than alembic, so this step is the
      # only thing that would catch a regressed migration.
      - name: Apply migrations (verifies alembic history)
        working-directory: backend
        run: uv run alembic upgrade head

      - name: Run pytest
        working-directory: backend
        run: uv run pytest -v

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      # `npm run build` runs `tsc -b && vite build`, so this covers both
      # TypeScript strict-mode type checking and the actual production build.
      - name: Type-check and build
        working-directory: frontend
        run: npm run build
